<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="neuro·log">
<meta name="theme-color" content="#0c0c14">
<title>neuro·log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c14;--bg2:#13131f;--bg3:#1a1a28;--border:#252535;
  --text:#e6e6f0;--muted:#7a7a90;
  --purple:#a78bfa;--orange:#fb923c;--green:#34d399;
  --yellow:#facc15;--blue:#60a5fa;--red:#f87171;
  --nav-h:70px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Bricolage Grotesque',sans-serif;-webkit-font-smoothing:antialiased}
body{max-width:480px;margin:0 auto;position:relative;
  /* safe area for iPhone home indicator */
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px);
}

.header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;background:rgba(12,12,20,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.header-brand{display:flex;flex-direction:column}
.header-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:var(--purple);line-height:1}
.header-sub{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-top:2px}
.header-right{display:flex;align-items:center;gap:8px}
.header-mood{font-size:24px}
.status-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500}
.status-badge.synced{border:1px solid rgba(52,211,153,.3);color:#34d399;background:rgba(52,211,153,.08)}
.status-badge.saving{border:1px solid rgba(167,139,250,.3);color:var(--purple);background:rgba(167,139,250,.08);animation:pulse 1s ease infinite}
.status-badge.local{border:1px solid rgba(250,204,21,.3);color:#facc15;background:rgba(250,204,21,.08)}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* NAV — fixed, respects safe area */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;z-index:20;
  padding-bottom:env(safe-area-inset-bottom);
  transition:transform .3s ease;
}
.nav.hidden{ display:none !important; }
.nav-btn{flex:1;background:none;border:none;color:var(--muted);padding:10px 4px 8px;font-size:9px;font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;text-transform:uppercase;letter-spacing:.5px;-webkit-tap-highlight-color:transparent;transition:color .15s}
.nav-btn.active{color:var(--purple)}
.nav-icon{font-size:18px}

.btn-primary{background:var(--purple);color:#0c0c14;border:none;border-radius:14px;padding:15px 20px;width:100%;font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-primary:active{opacity:.85}
.btn-secondary{background:var(--bg2);color:var(--muted);border:1px solid var(--border);border-radius:14px;padding:13px 16px;font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent;width:100%}
.btn-xs{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:11px;font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-add-checkin{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);color:var(--purple);border-radius:10px;padding:6px 12px;font-size:12px;font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;font-weight:500;-webkit-tap-highlight-color:transparent}

.page{display:none}
.page.active{display:block}

/* HOME */
.home{padding:20px}
.hero-card{background:linear-gradient(135deg,#1a1030 0%,#13131f 60%,#0f1a1a 100%);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(167,139,250,.1) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px}
.hero-date{font-family:'Instrument Serif',serif;font-size:26px;color:var(--text);line-height:1.2;margin-bottom:10px}
.hero-checkins{display:flex;gap:6px;flex-wrap:wrap}
.hero-dot{font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:4px 8px;color:var(--muted)}
.hero-empty{font-size:13px;color:var(--muted)}
.home-actions{display:flex;flex-direction:column;gap:10px}
.home-secondary{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* CHECKIN FORM */
.checkin-form{padding:16px}
.cf-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cf-time-label{font-size:13px;color:var(--muted);font-weight:500}
.cf-time-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 10px;font-size:15px;font-weight:600;font-family:'Bricolage Grotesque',sans-serif}
/* Extra bottom padding so save button clears the nav */
.cf-actions{display:flex;gap:10px;margin-top:16px;margin-bottom:8px}

.core-section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;display:flex;flex-direction:column;gap:16px}
.tri-field{display:flex;flex-direction:column;gap:6px}
.tri-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.tri-group{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tri-btn{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent;transition:all .15s}
.tri-btn.active{border-color:var(--purple);background:rgba(167,139,250,.15)}
.tri-emoji{font-size:24px;line-height:1}
.tri-text{font-size:11px;color:var(--muted)}
.tri-btn.active .tri-text{color:var(--purple)}

.opt-sections{display:flex;flex-direction:column;gap:6px}
.opt-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.opt-header{width:100%;background:none;border:none;color:var(--muted);padding:12px 14px;font-size:13px;font-weight:500;font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:transparent}
.opt-header.open{color:var(--text)}
.opt-body{padding:12px 14px 14px;border-top:1px solid var(--border)}
.opt-field-label{font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}

.med-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.med-row:last-child{border-bottom:none;padding-bottom:0}
.med-name{font-size:13px;font-weight:600;min-width:58px}
.med-controls{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
.med-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 10px;font-size:13px;font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent}
.med-btn.taken{background:rgba(52,211,153,.12);border-color:var(--green);color:var(--green)}
.med-btn.skipped{background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red)}
.med-time{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:5px 8px;font-size:12px;font-family:'Bricolage Grotesque',sans-serif;width:88px}

.toggle-group{display:flex;gap:8px;flex-wrap:wrap}
.toggle-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:8px 12px;font-size:13px;font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;display:flex;align-items:center;gap:5px;flex:1;justify-content:center;-webkit-tap-highlight-color:transparent}
.toggle-btn.active{background:rgba(167,139,250,.12);border-color:var(--purple);color:var(--purple)}
.toggle-btn.active.green{background:rgba(52,211,153,.1);border-color:var(--green);color:var(--green)}
.toggle-btn.active.red{background:rgba(248,113,113,.1);border-color:var(--red);color:var(--red)}

.text-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;font-family:'Bricolage Grotesque',sans-serif}
.text-input:focus{outline:none;border-color:var(--purple)}
.text-input::placeholder{color:var(--muted)}
.textarea{resize:vertical;min-height:80px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* HISTORY */
.page-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:var(--text);padding:16px 20px 4px}
.history-list{padding:12px 16px;display:flex;flex-direction:column;gap:6px}
.history-day-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.history-day-row.selected{border-color:var(--purple);background:rgba(167,139,250,.06)}
.hd-date{font-size:13px;font-weight:600;color:var(--text)}
.hd-summary{font-size:11px;color:var(--muted);margin-top:2px}
.hd-right{font-size:20px}
.day-view{padding:0 16px 12px}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px}
.day-date-label{font-size:13px;font-weight:600;color:var(--muted);text-transform:capitalize}
.checkins-list{display:flex;flex-direction:column;gap:8px}
.checkin-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px}
.checkin-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.checkin-time{font-size:14px;font-weight:700;color:var(--purple)}
.checkin-actions-row{display:flex;gap:6px}
.checkin-core{display:flex;gap:8px;flex-wrap:wrap}
.core-chip{display:flex;align-items:center;gap:4px;font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;color:var(--text)}
.core-chip.agit{border-color:rgba(251,146,60,.3);color:#fb923c}
.core-chip.energy{border-color:rgba(52,211,153,.3);color:#34d399}
.checkin-optional{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap}
.opt-chip{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted);background:var(--bg3)}
.opt-notes{font-size:12px;color:var(--muted);font-style:italic;line-height:1.5;margin-top:4px;width:100%}

/* CHARTS */
.charts-area{padding:12px 16px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
.chart-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.stat-value{font-family:'Instrument Serif',serif;font-size:32px;line-height:1}
.stat-label{font-size:10px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.5px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:12px;color:var(--muted);min-width:52px;text-align:right}
.bar-track{flex:1;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-pct{font-size:11px;color:var(--muted);min-width:32px}
.mood-timeline{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.timeline-row{display:flex;align-items:center;gap:8px}
.tl-date{font-size:10px;color:var(--muted);min-width:44px}
.tl-dots{display:flex;gap:4px}
.tl-dot{font-size:16px}

.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-big{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.7}

.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:100;pointer-events:none;white-space:nowrap;opacity:0}
.toast.show{animation:toastAnim 3s ease forwards}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}15%,80%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0}}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-title">neuro·log</div>
    <div class="header-sub">seu tracker de bem-estar</div>
  </div>
  <div class="header-right">
    <span class="status-badge saving" id="statusBadge">⟳ conectando</span>
    <span class="header-mood" id="headerMood"></span>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- HOME -->
<div class="page active" id="pageHome">
  <div class="home">
    <div class="hero-card">
      <div class="hero-label">hoje</div>
      <div class="hero-date" id="heroDate"></div>
      <div id="heroCheckins"><div class="hero-empty">Nenhum check-in ainda hoje</div></div>
    </div>
    <div class="home-actions">
      <button class="btn-primary" onclick="openCheckinForm()">＋ Check-in agora</button>
      <div class="home-secondary" id="homeSecondary" style="display:none">
        <button class="btn-secondary" onclick="showPage('history')">📋 Histórico</button>
        <button class="btn-secondary" onclick="showPage('charts')">📈 Análises</button>
      </div>
    </div>
  </div>
</div>

<!-- CHECKIN -->
<div class="page" id="pageCheckin">
  <div class="checkin-form">
    <div class="cf-header">
      <span class="cf-time-label">Horário</span>
      <input type="time" class="cf-time-input" id="cfTime">
    </div>
    <div class="core-section">
      <div class="tri-field"><div class="tri-label">Humor</div><div class="tri-group" id="triMood"></div></div>
      <div class="tri-field"><div class="tri-label">Agitação</div><div class="tri-group" id="triAgitation"></div></div>
      <div class="tri-field"><div class="tri-label">Energia</div><div class="tri-group" id="triEnergy"></div></div>
    </div>
    <div class="opt-sections">
      <div class="opt-section">
        <button class="opt-header" onclick="toggleOpt('Sleep',this)">🌙 Sono <span>▼</span></button>
        <div class="opt-body" id="optSleep" style="display:none">
          <div class="toggle-group" id="sleepBtns" style="margin-bottom:10px"></div>
          <div class="row-2">
            <div><div class="opt-field-label">Acordou às</div><input type="time" class="text-input" id="sleepWake"></div>
            <div><div class="opt-field-label">Horas dormidas</div><input type="number" min="0" max="24" step="0.5" class="text-input" placeholder="ex: 7.5" id="sleepHours"></div>
          </div>
        </div>
      </div>
      <div class="opt-section">
        <button class="opt-header" onclick="toggleOpt('Meds',this)">💊 Medicação <span>▼</span></button>
        <div class="opt-body" id="optMeds" style="display:none"><div id="medsRows"></div></div>
      </div>
      <div class="opt-section">
        <button class="opt-header" onclick="toggleOpt('Food',this)">🥗 Alimentação <span>▼</span></button>
        <div class="opt-body" id="optFood" style="display:none"><div class="tri-group" id="triFood"></div></div>
      </div>
      <div class="opt-section">
        <button class="opt-header" onclick="toggleOpt('Exercise',this)">🏃 Exercício <span>▼</span></button>
        <div class="opt-body" id="optExercise" style="display:none">
          <div class="toggle-group" style="margin-bottom:10px">
            <button class="toggle-btn" id="exYes" onclick="setExercise(true)">✓ Fiz!</button>
            <button class="toggle-btn" id="exNo"  onclick="setExercise(false)">✗ Não fiz</button>
          </div>
          <input type="text" class="text-input" id="exNotes" placeholder="o que foi, quanto tempo..." style="display:none">
        </div>
      </div>
      <div class="opt-section">
        <button class="opt-header" onclick="toggleOpt('Focus',this)">🎯 Foco <span>▼</span></button>
        <div class="opt-body" id="optFocus" style="display:none"><div class="tri-group" id="triFocus"></div></div>
      </div>
      <div class="opt-section">
        <button class="opt-header" onclick="toggleOpt('Notes',this)">📝 Notas <span>▼</span></button>
        <div class="opt-body" id="optNotes" style="display:none">
          <textarea class="text-input textarea" id="cfNotes" rows="3" placeholder="Gatilhos, eventos do dia..."></textarea>
        </div>
      </div>
    </div>
    <div class="cf-actions">
      <button class="btn-secondary" onclick="showPage('home')" style="flex:0 0 auto;width:auto;padding:15px 20px">Cancelar</button>
      <button class="btn-primary" onclick="saveCheckin()">Salvar check-in</button>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div class="page" id="pageHistory">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px">
    <div class="page-title" style="padding:0">Histórico</div>
    <button class="btn-add-checkin" onclick="openCheckinForm()">＋ check-in</button>
  </div>
  <div id="historyContent"></div>
</div>

<!-- CHARTS -->
<div class="page" id="pageCharts">
  <div class="page-title">Análises</div>
  <div id="chartsContent"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="navHome"    onclick="showPage('home')">    <span class="nav-icon">🏠</span><span>Início</span></button>
  <button class="nav-btn"        id="navCheckin" onclick="openCheckinForm()">   <span class="nav-icon">＋</span><span>Check-in</span></button>
  <button class="nav-btn"        id="navHistory" onclick="showPage('history')"> <span class="nav-icon">📋</span><span>Histórico</span></button>
  <button class="nav-btn"        id="navCharts"  onclick="showPage('charts')">  <span class="nav-icon">📈</span><span>Análises</span></button>
</nav>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxp5AQo6ilfCk_N9yH9KFzTTIp492BVfnDhGA3TV6vwK-Yrcde_dXvAPVaR32Ohvrkn/exec";
const CACHE_KEY  = "neurolog_v3";

const MEDS      = [{key:"puran",label:"Puran",color:"#60a5fa"},{key:"rexulti",label:"Rexulti",color:"#c084fc"},{key:"deller",label:"Deller",color:"#34d399"},{key:"glifage",label:"Glifage",color:"#facc15"},{key:"zetron",label:"Zetron",color:"#fb923c"}];
const MOOD      = [{v:1,e:"😔",l:"Baixo"},{v:5,e:"😐",l:"Neutro"},{v:9,e:"😄",l:"Bem"}];

const ENERGY    = [{v:1,e:"🪫",l:"Baixa"},{v:5,e:"😐",l:"Média"},{v:9,e:"🔋",l:"Alta"}];
const FOOD      = [{v:1,e:"😬",l:"Ruim"},{v:5,e:"🙂",l:"OK"},{v:9,e:"✅",l:"Boa"}];
const FOCUS     = [{v:1,e:"🌫️",l:"Baixo"},{v:5,e:"🙂",l:"Médio"},{v:9,e:"🎯",l:"Alto"}];
const SLEEP_OPT = [{v:"noite_inteira",e:"🌙",l:"Noite inteira"},{v:"acordou_voltou",e:"🌗",l:"Voltei a dormir"},{v:"acordou_ficou",e:"☀️",l:"Fiquei acordada"}];

let days = {};
let editingDate = null;
let currentForm = {};

const todayKey = () => new Date().toISOString().split("T")[0];
const getOpt   = (opts,v) => opts.find(o=>o.v===v);
const avg      = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;

init();
</script>
</body>
